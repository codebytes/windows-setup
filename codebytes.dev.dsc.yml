        allowPrerelease: true
      settings:
        id: Microsoft.VisualStudio.2022.Community
        source: winget

    - resource: PSDscResources/Script
      id: visualstudioworkloads
      dependsOn:
        - visualstudio
      directives:
        description: Configure Visual Studio workloads from .vsconfig
        allowPrerelease: true
      settings:
        GetScript: |
          @{ Result = $true }
        TestScript: |
          return $false
        SetScript: |
          $vsConfigUrl = "https://raw.githubusercontent.com/codebytes/windows-setup/main/.vsconfig"
          $vsConfigPath = "$env:TEMP\.vsconfig"
          Invoke-WebRequest -Uri $vsConfigUrl -OutFile $vsConfigPath
          $vsInstallerPath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          if (Test-Path $vsInstallerPath) {
            & $vsInstallerPath modify --installPath "${env:ProgramFiles}\Microsoft Visual Studio\2022\Community" --config $vsConfigPath --quiet
          }

