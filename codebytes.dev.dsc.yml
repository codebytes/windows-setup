# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
# codebytes Dev Machine Setup
properties:
  configurationVersion: 0.2.0
  resources:

# ─────────────────────────────────────────────
# Dev Drive (D:, 50 GB, ReFS)
# Only created when disk 0 has unallocated space and D: does not already exist.
# ─────────────────────────────────────────────
    - resource: Disk
      id: DevDrive
      directives:
        module: StorageDsc
        description: 'Create Dev Drive on D:'
        allowPrerelease: true
      settings:
        DiskId: '0'
        DiskIdType: 'Number'
        DriveLetter: 'D'
        FSLabel: 'Dev Drive'
        DevDrive: true
        AllowDestructive: false
        FSFormat: 'ReFS'
        Size: '50Gb'

