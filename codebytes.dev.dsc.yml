        allowPrerelease: true
      settings:
        GetScript: |
          @{ Result = $true }
        TestScript: |
          return $false
        SetScript: |
          $vsConfigUrl = "https://raw.githubusercontent.com/codebytes/windows-setup/main/.vsconfig"
          $vsConfigPath = "$env:TEMP\.vsconfig"
          Invoke-WebRequest -Uri $vsConfigUrl -OutFile $vsConfigPath
