# ─────────────────────────────────────────────
# Dev Drive (50 GB VHDX at C:\Users\Public\devdrive.vhdx, mounted as D:)
# Uses a VHD so no physical partition changes are needed.
# Skipped entirely if D: already exists.
# ─────────────────────────────────────────────
    - resource: PSDscResources/Script
      id: DevDrive
      directives:
        description: 'Create Dev Drive VHD on D:'
        allowPrerelease: true
      settings:
        GetScript: |
          @{ Result = Test-Path 'D:\' }
        TestScript: |
          # Skip if D: is already available
          return (Test-Path 'D:\')
        SetScript: |
          $vhdDir = 'C:\Users\Public'
          $vhdPath = Join-Path $vhdDir 'devdrive.vhdx'
          $sizeBytes = 50GB

          Write-Host "Creating Dev Drive VHDX at $vhdPath..."
          $vhd = New-VHD -Path $vhdPath -Dynamic -SizeBytes $sizeBytes
          $disk = $vhd | Mount-VHD -Passthru
          $init = $disk | Initialize-Disk -Passthru
          $part = $init | New-Partition -DriveLetter D -UseMaximumSize
          $part | Format-Volume -DevDrive -FileSystem ReFS -NewFileSystemLabel 'Dev Drive' -Confirm:$false -Force

          # Auto-mount on boot via Task Scheduler
          $action = New-ScheduledTaskAction -Execute 'powershell.exe' -Argument "-NoProfile -Command `"Mount-VHD -Path '$vhdPath'`""
          $trigger = New-ScheduledTaskTrigger -AtStartup
          $principal = New-ScheduledTaskPrincipal -UserId 'SYSTEM' -RunLevel Highest
          Register-ScheduledTask -TaskName 'Mount Dev Drive' -Action $action -Trigger $trigger -Principal $principal -Force | Out-Null
          Write-Host "Dev Drive created and configured to auto-mount at D:\"

