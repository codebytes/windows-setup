# ─────────────────────────────────────────────
# PowerShell Profile and Oh My Posh Setup
# ─────────────────────────────────────────────
    - resource: PSDscResources/Script
      id: SetupPowerShellProfile
      dependsOn:
        - powershell
        - ohmyposh
        - windowsterminal
      directives:
        description: Setup PowerShell profile and Oh My Posh theme
        allowPrerelease: true
      settings:
        GetScript: |
          $pwsh = Get-Command pwsh -ErrorAction SilentlyContinue
          $pwsh7ProfilePath = if ($pwsh) {
            & $pwsh.Source -NoProfile -Command '$PROFILE'
          } else { "$env:USERPROFILE\Documents\PowerShell\Microsoft.PowerShell_profile.ps1" }
          @{ Result = Test-Path $pwsh7ProfilePath }
        TestScript: |
          return $false
        SetScript: |
          try {
            $repoBase = "https://raw.githubusercontent.com/codebytes/windows-setup/main"

            # Download Oh My Posh theme
            $ompThemePath = "$env:USERPROFILE\codebytes.$env:COMPUTERNAME.omp.json"
            Invoke-WebRequest -Uri "$repoBase/codebytes.omp.json" -OutFile $ompThemePath -UseBasicParsing

            # Resolve actual profile paths (handles OneDrive folder redirection)
            $pwsh = Get-Command pwsh -ErrorAction SilentlyContinue
            $pwsh7ProfilePath = if ($pwsh) {
              & $pwsh.Source -NoProfile -Command '$PROFILE'
            } else { "$env:USERPROFILE\Documents\PowerShell\Microsoft.PowerShell_profile.ps1" }
            $pwsh7ProfileDir = Split-Path $pwsh7ProfilePath
            if (!(Test-Path $pwsh7ProfileDir)) {
              New-Item -Path $pwsh7ProfileDir -ItemType Directory -Force | Out-Null
            }
            $profileContent = @"
          # codebytes PowerShell Profile
          # Generated by windows-setup DSC configuration
          Import-Module -Name Terminal-Icons -ErrorAction SilentlyContinue
          Import-Module -Name z -ErrorAction SilentlyContinue
          # Oh My Posh theme
          `$ompTheme = "`$env:USERPROFILE\codebytes.`$env:COMPUTERNAME.omp.json"
          if (Test-Path `$ompTheme) {
            oh-my-posh init pwsh --config `$ompTheme | Invoke-Expression
          }
          "@
            $profileContent | Out-File -FilePath $pwsh7ProfilePath -Encoding UTF8 -Force

            # Copy to Windows PowerShell 5.1 profile too
            $winPSProfilePath = $pwsh7ProfilePath -replace '\\PowerShell\\', '\WindowsPowerShell\'
            $winPSProfileDir = Split-Path $winPSProfilePath
            if (!(Test-Path $winPSProfileDir)) {
              New-Item -Path $winPSProfileDir -ItemType Directory -Force | Out-Null
            }
            $profileContent | Out-File -FilePath $winPSProfilePath -Encoding UTF8 -Force

            # Install PowerShell modules
            $pwsh7Path = "$env:ProgramFiles\PowerShell\7\pwsh.exe"
            if (Test-Path $pwsh7Path) {
              & $pwsh7Path -NoProfile -ExecutionPolicy Bypass -Command {
                Install-PSResource -Name Terminal-Icons -TrustRepository -Scope CurrentUser -Quiet -ErrorAction SilentlyContinue
                Install-PSResource -Name z -TrustRepository -Scope CurrentUser -Quiet -ErrorAction SilentlyContinue
              }
            }

            # Install CascadiaCode Nerd Font
            & oh-my-posh font install CascadiaCode

            # Configure Windows Terminal to use the font
            $wtSettingsPath = "$env:LOCALAPPDATA\Packages\Microsoft.WindowsTerminal_8wekyb3d8bbwe\LocalState\settings.json"
            if (Test-Path $wtSettingsPath) {
              $settings = Get-Content $wtSettingsPath -Raw | ConvertFrom-Json
              if (-not $settings.profiles.defaults) {
                $settings.profiles | Add-Member -NotePropertyName "defaults" -NotePropertyValue @{} -Force
              }
              $settings.profiles.defaults | Add-Member -NotePropertyName "font" -NotePropertyValue @{ face = "CaskaydiaCove NF" } -Force
              $settings | ConvertTo-Json -Depth 10 | Set-Content $wtSettingsPath
            }
          } catch {
            Write-Error "Error in SetupPowerShellProfile: $_"
            throw
          }

# ─────────────────────────────────────────────
# Nerd Font (standalone, if OMP is already present)
# ─────────────────────────────────────────────
    - resource: PSDscResources/Script
      id: InstallNerdFont
      dependsOn:
        - ohmyposh
      directives:
        description: Install Meslo Nerd Font via Oh My Posh
        allowPrerelease: true
      settings:
        GetScript: |
          @{ Result = $false }
        TestScript: |
          # Check if Meslo font is already installed
          $fonts = (New-Object System.Drawing.Text.InstalledFontCollection).Families.Name
          return ($fonts -contains 'MesloLGM Nerd Font')
        SetScript: |
          & oh-my-posh font install meslo
