# ─────────────────────────────────────────────
# Bloatware Removal
# ─────────────────────────────────────────────
    - resource: PSDscResources/Script
      id: RemoveBloatware
      directives:
        description: Remove selected built-in UWP apps
        allowPrerelease: true
      settings:
        GetScript: |
          @{ Result = $true }
        TestScript: |
          $packages = @(
            'Disney.37853FC22B2CE',
            'Microsoft.BingNews',
            'Microsoft.GetHelp',
            'Microsoft.Getstarted',
            'Microsoft.MicrosoftSolitaireCollection',
            'Microsoft.MicrosoftOfficeHub',
            'Microsoft.WindowsFeedbackHub',
            'SpotifyAB.SpotifyMusic',
            'TeamViewer.TeamViewer.Host'
          )
          $found = $packages | Where-Object { Get-AppxPackage -Name $_ -ErrorAction SilentlyContinue }
          return ($found.Count -eq 0)
        SetScript: |
          $packages = @(
            'Disney.37853FC22B2CE',
            'Microsoft.BingNews',
            'Microsoft.GetHelp',
            'Microsoft.Getstarted',
            'Microsoft.MicrosoftSolitaireCollection',
            'Microsoft.MicrosoftOfficeHub',
            'Microsoft.WindowsFeedbackHub',
            'SpotifyAB.SpotifyMusic',
            'TeamViewer.TeamViewer.Host'
          )
          foreach ($name in $packages) {
            Get-AppxPackage -Name $name -ErrorAction SilentlyContinue |
              Remove-AppxPackage -ErrorAction SilentlyContinue
          }

# ─────────────────────────────────────────────
# Security and System Settings
# ─────────────────────────────────────────────
    - resource: PSDscResources/Script
      id: SecuritySettings
      directives:
        description: Enable PUA protection and harden system settings
        allowPrerelease: true
      settings:
        GetScript: |
          @{ Result = (Get-MpPreference).PUAProtection -eq 1 }
        TestScript: |
          try {
            $pua = (Get-MpPreference).PUAProtection -eq 1
            $autoplay = (Get-ItemProperty -Path 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\AutoplayHandlers' -Name 'DisableAutoplay' -ErrorAction SilentlyContinue).DisableAutoplay -eq 1
            $autorun = (Get-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer' -Name 'NoDriveTypeAutoRun' -ErrorAction SilentlyContinue).NoDriveTypeAutoRun -eq 255
            $delopt = (Get-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\DeliveryOptimization' -Name 'DODownloadMode' -ErrorAction SilentlyContinue).DODownloadMode -eq 100
            return ($pua -and $autoplay -and $autorun -and $delopt)
          } catch { return $false }
        SetScript: |
          # PUA protection
          Set-MpPreference -PUAProtection 1

          # Disable autoplay
          $apPath = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\AutoplayHandlers'
          if (-not (Test-Path $apPath)) { New-Item -Path $apPath -Force | Out-Null }
          New-ItemProperty -Path $apPath -Name 'DisableAutoplay' -PropertyType DWord -Value 1 -Force | Out-Null

          # Disable autorun
          $arPath = 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer'
          if (-not (Test-Path $arPath)) { New-Item -Path $arPath -Force | Out-Null }
          New-ItemProperty -Path $arPath -Name 'NoDriveTypeAutoRun' -PropertyType DWord -Value 255 -Force | Out-Null

          # Disable delivery optimization
          $doPath = 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\DeliveryOptimization'
          if (-not (Test-Path $doPath)) { New-Item -Path $doPath -Force | Out-Null }
          New-ItemProperty -Path $doPath -Name 'DODownloadMode' -PropertyType DWord -Value 100 -Force | Out-Null

